<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>:root{--bg:{{color_bg}};--fg:{{color_fg}};--accent:{{color_accent}};}</style>
  <link rel="stylesheet" href="https://appassets.androidplatform.net/assets/stylesheet.css">
  <script src="https://appassets.androidplatform.net/assets/mercury-parser.js"></script>
  <script src="https://appassets.androidplatform.net/assets/full-content.js"></script>
</head>
<body>
  <article>
    <header>
      <h1 class="article-title">{{title}}</h1>
      <div class="article-meta">{{feed_name}} · {{byline}}</div>
    </header>
    <div id="article-body">{{body}}</div>
  </article>
  {{full_content_script}}
</body>
</html>
