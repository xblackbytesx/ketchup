<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- img-src includes http: deliberately: cleartext feeds are a supported
       configuration (see network_security_config.xml) and their article images
       are plain-http too. Scripts stay fully blocked via default-src 'none'. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src https://appassets.androidplatform.net 'unsafe-inline'; img-src https: http: data:; media-src https: data:;" />
  <style>:root{--bg:{{color_bg}};--fg:{{color_fg}};--accent:{{color_accent}};}</style>
  <link rel="stylesheet" href="https://appassets.androidplatform.net/assets/stylesheet.css">
</head>
<body>
  <article>
    <header>
      <h1 class="article-title">{{title}}</h1>
      <div class="article-meta">{{feed_name}} · {{byline}}</div>
    </header>
    {{hero_image}}
    <div id="article-body">{{body}}</div>
  </article>
</body>
</html>
